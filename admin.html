<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloirePay - Tableau de Bord Traçabilité</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #10b981;
            --border-color: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-refresh {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-refresh:hover {
            opacity: 0.9;
        }
        .table-container {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: #111827;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background-color: #24334d;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-success { background-color: #065f46; color: #34d399; }
        .badge-info { background-color: #1e3a8a; color: #93c5fd; }
        .badge-warning { background-color: #78350f; color: #fcd34d; }
        pre {
            margin: 0;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <span>📊 Suivi des Transactions GloirePay</span>
        <button class="btn-refresh" onclick="chargerHistorique()">🔄 Actualiser</button>
    </h1>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 180px;">Date & Heure</th>
                    <th style="width: 180px;">Événement</th>
                    <th>Détails de l'action</th>
                </tr>
            </thead>
            <tbody id="log-rows">
                <tr>
                    <td colspan="3" style="text-align: center; color: #94a3b8;">Chargement de l'historique en cours...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function chargerHistorique() {
        const tbody = document.getElementById('log-rows');
        
        try {
            // Appel à la route de traçabilité du serveur
            const response = await fetch('/api/admin/logs');
            if (!response.ok) throw new Error('Impossible d'accéder aux logs');
            
            const texteBrut = await response.text();
            
            // Si le fichier est vide
            if (!texteBrut.trim() || texteBrut.startsWith("Aucune transaction")) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #94a3b8;">Aucun événement enregistré.</td></tr>`;
                return;
            }

            // Découpage du fichier ligne par ligne
            const lignes = texteBrut.trim().split('\n').reverse(); // Du plus récent au plus ancien
            tbody.innerHTML = '';

            lignes.forEach(ligne => {
                // Extraction du format : [DATE] [EVENEMENT] : {JSON}
                const regex = /^\[(.*?)\]\s+\[(.*?)\]\s+:\s+(.*)$/;
                const match = ligne.match(regex);

                if (match) {
                    const date = match[1];
                    const evenement = match[2];
                    const detailsRaw = match[3];

                    let evenementBadge = `<span class="badge badge-info">${evenement}</span>`;
                    if (evenement.includes('SUCCES') || evenement.includes('VALIDE')) {
                        evenementBadge = `<span class="badge badge-success">${evenement}</span>`;
                    } else if (evenement.includes('ECHEC')) {
                        evenementBadge = `<span class="badge badge-warning">${evenement}</span>`;
                    }

                    // Formatage propre du JSON pour la lecture numérique
                    let detailsFormates = detailsRaw;
                    try {
                        const objetJson = JSON.parse(detailsRaw);
                        detailsFormates = Object.entries(objetJson)
                            .map(([cle, valeur]) => `<strong>${cle}:</strong> ${typeof valeur === 'object' ? JSON.stringify(valeur) : valeur}`)
                            .join(' | ');
                    } catch (e) {
                        // Reste en texte brut si ce n'est pas un JSON parfait
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color: #94a3b8; font-size: 13px;">${date}</td>
                        <td>${evenementBadge}</td>
                        <td><pre>${detailsFormates}</pre></td>
                    `;
                    tbody.appendChild(tr);
                }
            });

        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #f87171;">❌ Erreur : Connexion au serveur impossible ou route introuvable.</td></tr>`;
        }
    }

    // Chargement automatique dès l'ouverture de la page
    window.onload = chargerHistorique;
</script>

</body>
  </html>
