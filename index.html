<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendstoc App - Global Market & Affiliation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-principal: #121214;
            --bg-carte: #1e1e24;
            --vert-whatsapp: #25D366;
            --bleu-partage: #0077b6;
            --orange-crypto: #f7931a;
            --violet-affiliation: #9b5de5;
            --rouge-action: #e63946;
            --texte-blanc: #ffffff;
            --texte-gris: #a0a0b0;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-principal);
            color: var(--texte-blanc);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--vert-whatsapp);
            margin: 5px 0;
            font-size: 28px;
        }

        .navigation-tabs {
            display: flex;
            justify-content: space-between;
            background-color: var(--bg-carte);
            padding: 5px;
            border-radius: 30px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--texte-gris);
            padding: 12px 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background-color: var(--vert-whatsapp);
            color: var(--bg-principal);
        }

        .app-section {
            display: none;
            background-color: var(--bg-carte);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .app-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input[type="text"], input[type="number"], .search-bar {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: var(--bg-principal);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }

        /* Style spécifique barre de recherche */
        .search-container {
            position: relative;
            margin-bottom: 15px;
        }
        .search-container i {
            position: absolute;
            right: 15px;
            top: 15px;
            color: var(--texte-gris);
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 2px dashed #444;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--texte-gris);
            background-color: var(--bg-principal);
            font-weight: bold;
        }

        .btn-principal {
            width: 100%;
            background-color: var(--vert-whatsapp);
            color: var(--bg-principal);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .grid-vitrine {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .product-card {
            background-color: var(--bg-principal);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn-action {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: white;
        }

        .btn-wa { background-color: var(--vert-whatsapp); color: #121214; }
        .btn-momo { background-color: #833ab4; }
        .btn-crypto { background-color: var(--orange-crypto); }
        .btn-aff { background-color: var(--violet-affiliation); grid-column: span 2; }
        .btn-sh { background-color: var(--bleu-partage); grid-column: span 2; }

        .qr-container {
            display: flex;
            justify-content: center;
            background: white;
            padding: 5px;
            border-radius: 8px;
            width: 80px;
            height: 80px;
            margin: 5px auto;
        }

        .badge-commission {
            background-color: var(--violet-affiliation);
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>VENDSTOC GLOBAL 🌍</h1>
            <p>Vitrine Connectée, Recherche & Affiliation</p>
        </div>

        <div class="navigation-tabs">
            <button id="btn-tab-vitrine" class="tab-btn active" onclick="changerOnglet('vitrine')"><i class="fa-solid fa-bag-shopping"></i> Vitrine</button>
            <button id="btn-tab-ajouter" class="tab-btn" onclick="changerOnglet('ajouter')"><i class="fa-solid fa-plus"></i> Publier</button>
        </div>

        <!-- SECTION 1 : VITRINE MONDIALE AVEC BARRE DE RECHERCHE -->
        <div id="section-vitrine" class="app-section active">
            
            <!-- Barre de Recherche Dynamique -->
            <div class="search-container">
                <input type="text" id="barre-recherche" class="search-bar" placeholder="🔍 Rechercher un article (ex: Nike, Sac...)" oninput="filtrerArticles()">
            </div>

            <h2><i class="fa-solid fa-earth-africa" style="color:var(--vert-whatsapp)"></i> Articles en Temps Réel</h2>
            <div class="grid-vitrine" id="vitrine-container"></div>
        </div>

        <!-- SECTION 2 : FORMULAIRE -->
        <div id="section-ajouter" class="app-section">
            <h2><i class="fa-solid fa-cart-plus"></i> Infos Marchandise & Vendeur</h2>
            
            <div class="form-group">
                <label for="img-input" class="custom-file-upload">
                    <i class="fa-solid fa-camera fa-lg" style="color: var(--vert-whatsapp);"></i> 
                    <span id="file-label">Prendre la photo du produit</span>
                </label>
                <input type="file" id="img-input" accept="image/*" onchange="mettreAJourNomFichier()">
            </div>

            <div class="form-group">
                <input type="text" id="p-nom" placeholder="Nom de l'article">
            </div>

            <div class="form-group">
                <input type="number" id="p-prix" placeholder="Prix de vente (FCFA)">
            </div>

            <div class="form-group">
                <input type="number" id="p-commission" placeholder="Commission Affiliation en % (Ex: 10)" value="10">
            </div>

            <h3 style="color:var(--vert-whatsapp); border-top: 1px solid #333; padding-top:15px;"> Coordonnées de Paiement</h3>

            <div class="form-group">
                <input type="text" id="p-whatsapp" placeholder="N° WhatsApp Vendeur (ex: 23566000000)">
            </div>

            <div class="form-group">
                <input type="text" id="p-crypto" placeholder="Adresse Portefeuille Crypto">
            </div>

            <button class="btn-principal" onclick="publierSurLeMonde()"><i class="fa-solid fa-paper-plane"></i> Mettre en ligne & Publier</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ekmlcvyrjlenujvlixik.supabase.co";
        const SUPABASE_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrbWxjdnlyamxlbnVqdmxpeGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDUzODUsImV4cCI6MjA5NzAyMTM4NX0.Y1f8Ogp-RfE_wvJi4GCz8BdwMsjZ3YM8tggHveByNQw";

        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dvoya2e3o/image/upload";
        const UPLOAD_PRESET = "ml_default"; 

        let tousLesArticles = []; // Stockage local des articles pour la recherche rapide

        function changerOnglet(cible) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`section-${cible}`).classList.add('active');
            document.getElementById(`btn-tab-${cible}`).classList.add('active');

            if(cible === 'vitrine') { chargerArticlesMondiaux(); }
        }

        function mettreAJourNomFichier() {
            const input = document.getElementById('img-input');
            const label = document.getElementById('file-label');
            if(input.files && input.files[0]) { label.innerText = "📸 " + input.files[0].name; }
        }

        // --- FILTRE DYNAMIQUE (BARRE DE RECHERCHE) ---
        function filtrerArticles() {
            const recherche = document.getElementById('barre-recherche').value.toLowerCase().trim();
            const articlesFiltres = tousLesArticles.filter(art => art.nom.toLowerCase().includes(recherche));
            afficherVitrine(articlesFiltres);
        }

        // --- PUBLICATION ---
        async function publierSurLeMonde() {
            const nom = document.getElementById('p-nom').value.trim();
            const prix = document.getElementById('p-prix').value.trim();
            const commission = document.getElementById('p-commission').value.trim();
            const whatsapp = document.getElementById('p-whatsapp').value.trim();
            const crypto = document.getElementById('p-crypto').value.trim();
            const fileInput = document.getElementById('img-input');

            if (!nom || !prix || !whatsapp) {
                alert("Veuillez remplir au moins le nom, le prix et votre numéro WhatsApp.");
                return;
            }

            let urlImage = "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400";

            if (fileInput.files && fileInput.files[0]) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('upload_preset', UPLOAD_PRESET);

                try {
                    const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                    const data = await res.json();
                    if(data.secure_url) urlImage = data.secure_url;
                } catch (e) { console.error("Erreur image Cloudinary"); }
            }

            const donnesArticle = { 
                nom, 
                prix: parseInt(prix), 
                image: urlImage, 
                whatsapp, 
                crypto_wallet: crypto,
                commission_pct: parseInt(commission) || 10
            };

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/articles`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(donnesArticle)
                });

                alert("🚀 Marchandise publiée avec succès !");
                document.getElementById('p-nom').value = "";
                document.getElementById('p-prix').value = "";
                document.getElementById('p-whatsapp').value = "";
                document.getElementById('p-crypto').value = "";
                fileInput.value = "";
                changerOnglet('vitrine');

            } catch (error) { alert("Erreur lors de la publication."); }
        }

        // --- CHARGEMENT DEPUIS SUPABASE ---
        async function chargerArticlesMondiaux() {
            const container = document.getElementById('vitrine-container');
            container.innerHTML = "<p>Connexion au marché mondial...</p>";

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/articles?order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                tousLesArticles = await res.json();
                filtrerArticles(); // Affiche et applique si du texte est déjà saisi
            } catch (e) { container.innerHTML = "<p>Erreur de synchronisation.</p>"; }
        }

        // --- RENDU GRAPHIQUE DES CARTES ---
        function afficherVitrine(liste) {
            const container = document.getElementById('vitrine-container');
            container.innerHTML = "";

            if(liste.length === 0) {
                container.innerHTML = "<p>Aucun article ne correspond à votre recherche.</p>";
                return;
            }

            // Détection si le client arrive via un lien d'affilié (?ref=...)
            const urlParams = new URLSearchParams(window.location.search);
            const parentAffilie = urlParams.get('ref') || "";

            liste.forEach((art) => {
                const carte = document.createElement('div');
                carte.className = "product-card";
                
                // Calcul de la valeur de commission en FCFA
                const valeurCommission = (art.prix * (art.commission_pct || 10)) / 100;

                // Construction des liens
                let texteWA = `Bonjour, je souhaite commander l'article *${art.nom}* au prix de ${art.prix} FCFA.`;
                if(parentAffilie) {
                    texteWA += `\n\n_(Commande passée via l'affilié ID: ${parentAffilie})_`;
                }
                const lienWA = `https://api.whatsapp.com/send?phone=${art.whatsapp}&text=${encodeURIComponent(texteWA)}`;
                const lienMomo = `https://www.monetbil.com/pay/v2.1/votre_identifiant_monetbil?amount=${art.prix}`; 

                carte.innerHTML = `
                    <img src="${art.image}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="margin:0; text-transform:capitalize;">${art.nom}</h3>
                        <span style="color:var(--vert-whatsapp); font-weight:bold; font-size:18px;">${art.prix.toLocaleString()} FCFA</span>
                    </div>
                    
                    <div style="display:flex; justify-content: space-between; align-items:center; margin-top:5px;">
                        <span class="badge-commission"><i class="fa-solid fa-money-bill-trend-up"></i> Affiliation : ${art.commission_pct}% (${valeurCommission} FCFA)</span>
                    </div>

                    <div style="text-align:center; font-size:11px; color:var(--texte-gris); margin-top:10px;">Scan pour voir la fiche produit :</div>
                    <div class="qr-container" id="qr-${art.id}"></div>

                    <div class="action-buttons">
                        <button class="btn-action btn-wa" onclick="window.open('${lienWA}', '_blank')"><i class="fa-brands fa-whatsapp"></i> Commander</button>
                        <button class="btn-action btn-momo" onclick="window.open('${lienMomo}', '_blank')"><i class="fa-solid fa-mobile-screen"></i> Mobile Money</button>
                        ${art.crypto_wallet ? `<button class="btn-action btn-crypto" onclick="navigator.clipboard.writeText('${art.crypto_wallet}'); alert('Adresse Crypto copiée !')"><i class="fa-brands fa-ethereum"></i> Pay Crypto</button>` : ''}
                        
                        <!-- BOUTON D'AFFILIATION SUPRÊME -->
                        <button class="btn-action btn-aff" onclick="genererLienAffiliation(${art.id}, '${art.nom}')">
                            <i class="fa-solid fa-link"></i> Devenir Affilié (Gagner ${valeurCommission} FCFA)
                        </button>

                        <button class="btn-action btn-sh" onclick="partagerLienGlobal('${art.nom}', ${art.prix})"><i class="fa-solid fa-share-nodes"></i> Partager</button>
                    </div>
                `;
                container.appendChild(carte);

                new QRCode(document.getElementById(`qr-${art.id}`), {
                    text: window.location.href,
                    width: 80,
                    height: 80
                });
            });
        }

        // --- SYSTEME D'AFFILIATION DYNAMIQUE ---
        function genererLienAffiliation(idArticle, nomArticle) {
            const nomAffilie = prompt("Entrez votre Prénom + Numéro WhatsApp pour créer votre lien d'affilié (Ex: Moussa23566...) :");
            if(!nomAffilie) return;

            // Construit l'adresse URL d'affiliation unique
            const cleanRef = nomAffilie.replace(/[^a-zA-Z0-9]/g, "");
            const lienAffiliationUnique = `${window.location.origin}${window.location.pathname}?product=${idArticle}&ref=${cleanRef}`;

            // Copie automatique dans le presse-papier de l'affilié
            navigator.clipboard.writeText(lienAffiliationUnique);

            alert(`🎉 Félicitations ! Votre lien d'affilié pour "${nomArticle}" a été généré et copié !\n\nPartagez-le partout. Si quelqu'un achète via ce lien, le vendeur saura que c'est grâce à vous (${cleanRef}).\n\nLien : ${lienAffiliationUnique}`);
        }

        function partagerLienGlobal(nom, prix) {
            const txt = `🔥 *PRODUIT DISPONIBLE SUR VENDSTOC* 🔥\n\n📦 *Article :* ${nom.toUpperCase()}\n💰 *Prix :* ${prix.toLocaleString()} FCFA\n\nDécouvrez-le ici : ${window.location.href}`;
            if(navigator.share) { navigator.share({ title: nom, text: txt }); } 
            else { window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(txt)}`, '_blank'); }
        }

        window.onload = function() { chargerArticlesMondiaux(); };
    </script>
</body>
                </html>
