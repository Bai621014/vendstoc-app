<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendstoc App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-principal: #121214;
            --bg-carte: #1e1e24;
            --vert-whatsapp: #25D366;
            --rouge-action: #e63946;
            --texte-blanc: #ffffff;
            --texte-gris: #a0a0b0;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg-principal);
            color: var(--texte-blanc);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: var(--vert-whatsapp);
            margin: 5px 0;
            font-size: 28px;
        }
        .navigation-tabs {
            display: flex;
            justify-content: space-between;
            background-color: var(--bg-carte);
            padding: 5px;
            border-radius: 30px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--texte-gris);
            padding: 12px 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab-btn.active {
            background-color: var(--vert-whatsapp);
            color: var(--bg-principal);
        }
        .app-section {
            display: none;
            background-color: var(--bg-carte);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .app-section.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: var(--bg-principal);
            color: white;
            box-sizing: border-box;
        }
        .btn-principal {
            width: 100%;
            background-color: var(--vert-whatsapp);
            color: var(--bg-principal);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .grid-vitrine {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        .product-card {
            background-color: var(--bg-principal);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 1px solid #222;
        }
        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }
        .video-box {
            width: 100%;
            height: 220px;
            background-color: #000;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--texte-gris);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>VENDSTOC APP 🚀</h1>
            <p>Live Vidéo • Saisie Vocale • Facture Signée</p>
        </div>

        <div class="navigation-tabs">
            <button id="btn-tab-live" class="tab-btn active" onclick="changerOnglet('live')"><i class="fa-solid fa-tv"></i> Direct Live</button>
            <button id="btn-tab-vitrine" class="tab-btn" onclick="changerOnglet('vitrine')"><i class="fa-solid fa-bag-shopping"></i> Vitrine</button>
            <button id="btn-tab-clients" class="tab-btn" onclick="changerOnglet('clients')"><i class="fa-solid fa-phone"></i> Clients</button>
        </div>

        <div id="section-live" class="app-section active">
            <h2>Direct Live</h2>
            <div class="video-box">
                <span>[ Caméra prête pour la diffusion ]</span>
            </div>
            <button class="btn-principal" style="background-color:var(--rouge-action); color:white;">
                <i class="fa-solid fa-microphone"></i> Activer Micro Commerce
            </button>
        </div>

        <div id="section-vitrine" class="app-section">
            <h2>Enregistrer une Marchandise</h2>
            <div class="form-group">
                <input type="text" id="p-nom" placeholder="Nom de l'article">
            </div>
            <div class="form-group">
                <input type="number" id="p-prix" placeholder="Prix en FCFA">
            </div>
            <button class="btn-principal" onclick="sauvegarderArticle()">Enregistrer</button>

            <div class="grid-vitrine" id="vitrine-container"></div>
        </div>

        <div id="section-clients" class="app-section">
            <h2>Suivi Clients</h2>
            <p>Base de données locale active.</p>
        </div>
    </div>

    <script>
        let catalogueArticles = JSON.parse(localStorage.getItem('vendstoc_articles')) || [];

        function changerOnglet(cible) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            const sec = document.getElementById(`section-${cible}`);
            const btn = document.getElementById(`btn-tab-${cible}`);
            
            if(sec) sec.classList.add('active');
            if(btn) btn.add('active');

            if(cible === 'vitrine') {
                afficherCatalogue();
            }
        }

        function sauvegarderArticle() {
            const nom = document.getElementById('p-nom').value.trim();
            const prix = document.getElementById('p-prix').value.trim();

            if(!nom || !prix) {
                alert("Remplissez les champs");
                return;
            }

            const art = {
                id: Date.now(),
                nom: nom,
                prix: parseInt(prix),
                image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"
            };

            catalogueArticles.push(art);
            localStorage.setItem('vendstoc_articles', JSON.stringify(catalogueArticles));
            
            document.getElementById('p-nom').value = "";
            document.getElementById('p-prix').value = "";
            afficherCatalogue();
        }

        function afficherCatalogue() {
            const c = document.getElementById('vitrine-container');
            if(!c) return;
            c.innerHTML = "";
            
            if(catalogueArticles.length === 0) {
                c.innerHTML = "<p>Aucun article.</p>";
                return;
            }

            catalogueArticles.forEach(a => {
                c.innerHTML += `
                    <div class="product-card">
                        <img src="${a.image}">
                        <h4>${a.nom}</h4>
                        <p style="color:var(--vert-whatsapp); font-weight:bold;">${a.prix} FCFA</p>
                    </div>
                `;
            });
        }

        window.onload = function() {
            afficherCatalogue();
        };
    </script>
</body>
</html>
