<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail de Paiement Multi-Réseaux</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script type="text/javascript" src="https://fr.monetbil.com/widget/v2/monetbil.min.js"></script>
    <style>
        :root { --bg-p: #121214; --bg-c: #1e1e24; --v-af: #9b5de5; --t-b: #ffffff; --t-g: #a0a0b0; --v-wa: #25D366; }
        body { font-family: sans-serif; background-color: var(--bg-p); color: var(--t-b); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        .card { background-color: var(--bg-c); padding: 20px; border-radius: 15px; margin-top: 10px; }
        .form-group { margin-bottom: 15px; }
        select, input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #333; background-color: var(--bg-p); color: white; box-sizing: border-box; }
        .btn-principal { width: 100%; background-color: var(--v-af); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-back { background: none; border: 1px solid #444; color: var(--t-g); padding: 8px 15px; border-radius: 20px; text-decoration: none; display: inline-block; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back">⬅️ Retour à la Vitrine</a>
        
        <h2>Portail de Paiement & Transfert</h2>
        <div id="item-details" style="background:#121214; padding:10px; border-radius:8px; margin-bottom:15px; display:none;">
            <p style="margin:5px 0; color:var(--v-wa);">🛒 Article : <span id="detail-nom" style="color:white; font-weight:bold;"></span></p>
            <p style="margin:5px 0; color:var(--v-wa);">💵 Prix : <span id="detail-prix" style="color:white; font-weight:bold;"></span></p>
        </div>

        <div class="card">
            <div class="form-group">
                <label style="font-size:12px; color:var(--t-g);">Moyen de règlement / Envoi :</label>
                <select id="transfert-canal" onchange="ajusterCanal()">
                    <option value="momo">Mobile Money (Airtel / Orange / MTN via Monetbil)</option>
                    <option value="crypto">Portefeuille Blockchain (Web3)</option>
                </select>
            </div>

            <div class="form-group">
                <label id="label-destinataire" style="font-size:12px; color:var(--t-g);">Numéro de téléphone / Portefeuille</label>
                <input type="text" id="transfert-destinataire" placeholder="Ex: +23566000000 ou 0x...">
            </div>

            <div class="form-group">
                <label style="font-size:12px; color:var(--t-g);">Montant</label>
                <input type="number" id="transfert-montant" placeholder="Ex: 5000">
            </div>

            <button class="btn-principal" onclick="traiterPaiement()">
                <i class="fa-solid fa-paper-plane"></i> Confirmer l'opération
            </button>
            
            <div style="margin-top:20px; text-align:center;" id="monetbil-btn-container"></div>
        </div>
    </div>

    <script>
        const GLOIREHUB_API_URL = "https://api.gloirehub.com/v1"; 
        const GLOIREHUB_API_KEY = "GH_SEC_TOKEN_PROD_XYZ123";

        function ajusterCanal() {
            const canal = document.getElementById('transfert-canal').value;
            const lbl = document.getElementById('label-destinataire');
            const inp = document.getElementById('transfert-destinataire');
            if (canal === 'crypto') { lbl.innerText = "Adresse Crypto (0x...)"; inp.placeholder = "0x..."; }
            else { lbl.innerText = "Numéro du destinataire"; inp.placeholder = "Ex: +23566000000"; }
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const item = urlParams.get('item');
            const price = urlParams.get('price');
            const wallet = urlParams.get('wallet');

            if (item && price) {
                document.getElementById('item-details').style.display = 'block';
                document.getElementById('detail-nom').innerText = item;
                document.getElementById('detail-prix').innerText = price;
                document.getElementById('transfert-montant').value = price;
                if(wallet && wallet !== "null") document.getElementById('transfert-destinataire').value = wallet;
            }
            ajusterCanal();
        };

        async function traiterPaiement() {
            const canal = document.getElementById('transfert-canal').value;
            const dest = document.getElementById('transfert-destinataire').value.trim();
            const montant = document.getElementById('transfert-montant').value.trim();

            if(!dest || !montant) return alert("Veuillez remplir tous les champs.");

            if (canal === 'crypto') {
                if (typeof window.ethereum === 'undefined') return alert("Veuillez ouvrir dans un navigateur Web3 (MetaMask/Trust).");
                try {
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const signer = await provider.getSigner();
                    alert("Envoi des fonds sur la Blockchain...");
                    const tx = await signer.sendTransaction({ to: dest, value: ethers.parseEther(montant) });
                    await tx.wait();
                    alert("🎉 Succès Blockchain !");
                } catch(e) { alert("Échec du paiement crypto."); }
            } else {
                alert("Lancement de la passerelle de paiement sécurisée Mobile Money...");
                // Intégration Dynamique Instantanée du Widget de paiement officiel Monetbil
                Monetbil.widget({
                    version: 'v2.1',
                    service: 's5dyzsP', // Votre ID de service Monetbil
                    amount: montant,
                    phonenumber: dest,
                    country: 'TD',
                    container: document.getElementById('monetbil-btn-container')
                });
            }
        }
    </script>
</body>
</html>
